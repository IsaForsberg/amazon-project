<!DOCTYPE html>
<html>
  <head>
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/orders.css">
  </head>
  <body>
    <!-- Header -->
    <div class="amazon-header">
      <div class="amazon-header-left-section">
        <a href="amazon.html" class="header-link">
          <img class="amazon-logo" src="images/amazon-logo-white.png">
          <img class="amazon-mobile-logo" src="images/amazon-mobile-logo-white.png">
        </a>
      </div>

      <div class="amazon-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">
        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="amazon-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>
        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity">3</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="page-title">Your Orders</div>
      <div class="orders-grid js-orders-grid"></div>
    </div>

    <!-- Script -->
    <script type="module">
      import { cart } from '../../data/cart.js';
      import { getProduct, loadProductsFetch } from '../../data/products.js';

      function renderOrders() {
        let ordersHTML = '';

        cart.forEach(cartItem => {
          const product = getProduct(cartItem.productId);
          if (!product) return; // skydd om produkten inte hittas

          ordersHTML += `
            <div class="order-container">
              <div class="order-header">
                <div class="order-header-left-section">
                  <div class="order-date">
                    <div class="order-header-label">Order Placed:</div>
                    <div>${new Date().toLocaleDateString()}</div>
                  </div>
                  <div class="order-total">
                    <div class="order-header-label">Total:</div>
                    <div>${product.getPrice()}</div>
                  </div>
                </div>
                <div class="order-header-right-section">
                  <div class="order-header-label">Order ID:</div>
                  <div>${cartItem.productId}</div>
                </div>
              </div>

              <div class="order-details-grid">
                <div class="product-image-container">
                  <img src="${product.image}">
                </div>
                <div class="product-details">
                  <div class="product-name">${product.name}</div>
                  <div class="product-quantity">Quantity: ${cartItem.quantity}</div>
                </div>
                <div class="product-actions">
                  <a href="tracking.html?productId=${product.id}">
                    <button class="track-package-button button-secondary">
                      Track package
                    </button>
                  </a>
                </div>
              </div>
            </div>
          `;
        });

        document.querySelector('.js-orders-grid').innerHTML = ordersHTML;
      }

      // Ladda produkter först, sedan rendera orders
      loadProductsFetch().then(() => {
        renderOrders();
      });
    </script>
  </body>
</html>
